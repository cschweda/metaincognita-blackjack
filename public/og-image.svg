<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Metaincognita branded background (design-system.md §8) + blackjack content layer -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0c1a"/>
      <stop offset="1" stop-color="#060810"/>
    </linearGradient>
    <pattern id="grid-fine" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1e2848" stroke-width="0.6" opacity="0.75"/>
    </pattern>
    <pattern id="grid-major" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#283458" stroke-width="1.2"/>
    </pattern>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.8" fill="#2a3460"/>
    </pattern>
    <radialGradient id="vignette" cx="0.5" cy="0.45" r="0.75">
      <stop offset="0.55" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>
    <radialGradient id="felt" cx="0.5" cy="0.1" r="1">
      <stop offset="0" stop-color="#0d7a48"/>
      <stop offset="0.7" stop-color="#0a5c36"/>
      <stop offset="1" stop-color="#07472a"/>
    </radialGradient>
    <linearGradient id="rail" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#78593a"/>
      <stop offset="1" stop-color="#3d2713"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- background stack -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid-fine)"/>
  <rect width="1200" height="630" fill="url(#grid-major)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- felt table segment (bottom-right content layer) -->
  <g>
    <ellipse cx="720" cy="640" rx="560" ry="330" fill="url(#rail)"/>
    <ellipse cx="720" cy="648" rx="538" ry="312" fill="url(#felt)"/>
    <text x="720" y="378" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700" letter-spacing="7" fill="#d4a847" opacity="0.92" text-anchor="middle">BLACKJACK PAYS 3 TO 2</text>
    <text x="720" y="412" font-family="Georgia, 'Times New Roman', serif" font-size="15" letter-spacing="4" fill="#f5f0e1" fill-opacity="0.55" text-anchor="middle">INSURANCE PAYS 2 TO 1</text>
  </g>

  <!-- the natural: A♠ + K♥ -->
  <g filter="url(#cardShadow)" transform="translate(572 428) rotate(-8)">
    <rect width="118" height="160" rx="11" fill="#fafaf9" stroke="#d4d4d4"/>
    <text x="13" y="38" font-family="Georgia, serif" font-size="30" font-weight="700" fill="#1a1a1a">A</text>
    <text x="13" y="66" font-family="Georgia, serif" font-size="26" fill="#1a1a1a">♠</text>
    <text x="59" y="102" font-family="Georgia, serif" font-size="56" fill="#1a1a1a" text-anchor="middle">♠</text>
  </g>
  <g filter="url(#cardShadow)" transform="translate(672 420) rotate(7)">
    <rect width="118" height="160" rx="11" fill="#fafaf9" stroke="#d4d4d4"/>
    <text x="13" y="38" font-family="Georgia, serif" font-size="30" font-weight="700" fill="#dc2626">K</text>
    <text x="13" y="66" font-family="Georgia, serif" font-size="26" fill="#dc2626">♥</text>
    <text x="59" y="102" font-family="Georgia, serif" font-size="56" fill="#dc2626" text-anchor="middle">♥</text>
  </g>

  <!-- chip stack -->
  <g transform="translate(884 496)">
    <ellipse cx="0" cy="26" rx="42" ry="13" fill="#1a1a1a" stroke="#f5f0e1" stroke-opacity="0.4" stroke-width="2" stroke-dasharray="9 6"/>
    <ellipse cx="0" cy="14" rx="42" ry="13" fill="#16a34a" stroke="#f5f0e1" stroke-opacity="0.45" stroke-width="2" stroke-dasharray="9 6"/>
    <ellipse cx="0" cy="2" rx="42" ry="13" fill="#dc2626" stroke="#f5f0e1" stroke-opacity="0.5" stroke-width="2" stroke-dasharray="9 6"/>
    <ellipse cx="0" cy="-10" rx="42" ry="13" fill="#d4a847" stroke="#f5f0e1" stroke-opacity="0.6" stroke-width="2" stroke-dasharray="9 6"/>
  </g>

  <!-- strategy-chart motif (the EV engine, right edge) -->
  <g transform="translate(1009 168)" opacity="0.85">
    <text x="0" y="-12" font-family="'Fira Code', Menlo, monospace" font-size="13" fill="#64748b" letter-spacing="2">BASIC STRATEGY</text>
    <g>
      <rect x="0" y="0" width="26" height="22" fill="#0c4a6e"/><rect x="28" y="0" width="26" height="22" fill="#0c4a6e"/><rect x="56" y="0" width="26" height="22" fill="#064e3b"/><rect x="84" y="0" width="26" height="22" fill="#064e3b"/><rect x="112" y="0" width="26" height="22" fill="#0c4a6e"/>
      <rect x="0" y="24" width="26" height="22" fill="#064e3b"/><rect x="28" y="24" width="26" height="22" fill="#78350f"/><rect x="56" y="24" width="26" height="22" fill="#78350f"/><rect x="84" y="24" width="26" height="22" fill="#064e3b"/><rect x="112" y="24" width="26" height="22" fill="#0c4a6e"/>
      <rect x="0" y="48" width="26" height="22" fill="#581c87"/><rect x="28" y="48" width="26" height="22" fill="#064e3b"/><rect x="56" y="48" width="26" height="22" fill="#0c4a6e"/><rect x="84" y="48" width="26" height="22" fill="#78350f"/><rect x="112" y="48" width="26" height="22" fill="#064e3b"/>
      <text x="9" y="16" font-family="'Fira Code', Menlo, monospace" font-size="12" fill="#7dd3fc">H</text><text x="37" y="16" font-family="'Fira Code', Menlo, monospace" font-size="12" fill="#7dd3fc">H</text><text x="65" y="16" font-family="'Fira Code', Menlo, monospace" font-size="12" fill="#6ee7b7">S</text><text x="93" y="16" font-family="'Fira Code', Menlo, monospace" font-size="12" fill="#6ee7b7">S</text><text x="121" y="16" font-family="'Fira Code', Menlo, monospace" font-size="12" fill="#7dd3fc">H</text>
      <text x="9" y="40" font-family="'Fira Code', Menlo, monospace" font-size="12" fill="#6ee7b7">S</text><text x="37" y="40" font-family="'Fira Code', Menlo, monospace" font-size="12" fill="#fbbf24">D</text><text x="65" y="40" font-family="'Fira Code', Menlo, monospace" font-size="12" fill="#fbbf24">D</text><text x="93" y="40" font-family="'Fira Code', Menlo, monospace" font-size="12" fill="#6ee7b7">S</text><text x="121" y="40" font-family="'Fira Code', Menlo, monospace" font-size="12" fill="#7dd3fc">H</text>
      <text x="9" y="64" font-family="'Fira Code', Menlo, monospace" font-size="12" fill="#d8b4fe">P</text><text x="37" y="64" font-family="'Fira Code', Menlo, monospace" font-size="12" fill="#6ee7b7">S</text><text x="65" y="64" font-family="'Fira Code', Menlo, monospace" font-size="12" fill="#7dd3fc">H</text><text x="93" y="64" font-family="'Fira Code', Menlo, monospace" font-size="12" fill="#fbbf24">D</text><text x="121" y="64" font-family="'Fira Code', Menlo, monospace" font-size="12" fill="#6ee7b7">S</text>
    </g>
    <text x="0" y="100" font-family="'Fira Code', Menlo, monospace" font-size="14" fill="#d4a847">RC +4&#160;&#160;TC +1.3</text>
  </g>

  <!-- title block -->
  <g>
    <text x="64" y="118" font-family="'Fira Code', Menlo, monospace" font-size="58" font-weight="700" fill="#d4a847" filter="url(#glow)">Blackjack Trainer</text>
    <text x="66" y="162" font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="21" fill="#64748b" letter-spacing="1">Basic strategy &#183; Hi-Lo counting &#183; Rules from official casino documents</text>
    <text x="66" y="200" font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#a1a1aa" letter-spacing="5">LEARN THE BOOK. COUNT THE SHOE. KEEP YOUR MONEY.</text>
  </g>

  <!-- vignette over everything except chrome -->
  <rect width="1200" height="630" fill="url(#vignette)"/>

  <!-- corner registration marks -->
  <g stroke="#3a4570" stroke-width="2" fill="none">
    <path d="M 24 44 L 24 24 L 44 24"/>
    <path d="M 1156 24 L 1176 24 L 1176 44"/>
    <path d="M 1176 586 L 1176 606 L 1156 606"/>
    <path d="M 44 606 L 24 606 L 24 586"/>
  </g>

  <!-- bottom branding -->
  <rect x="64" y="594" width="120" height="4" fill="#d4a847"/>
  <line x1="0" y1="600" x2="1200" y2="600" stroke="#1e2848" stroke-width="1"/>
  <text x="64" y="621" font-family="'Fira Code', Menlo, monospace" font-size="13" fill="#3a4570" letter-spacing="6">METAINCOGNITA</text>
  <text x="1136" y="621" font-family="'Fira Code', Menlo, monospace" font-size="13" fill="#3a4570" letter-spacing="2" text-anchor="end">CASINO SIMULATOR SUITE</text>
</svg>
